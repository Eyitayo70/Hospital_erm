<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audit Log · Wayfind General Hospital Registry</title>
<link rel="icon" href="/img/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<script src="/js/app.js"></script>
<script>
(async function() {
  const me = await requireRole("officer");
  if (!me) return;

  renderShell("audit", "Audit Log", "Accountability & Governance");

  document.getElementById("page-content").innerHTML = `
    <p class="helper-text">Every login, folder access, edit, and doctor's report action is recorded here — who did what, to which record, and when. Most recent 200 entries, split by who performed the action.</p>
    <div class="view-tabs">
      <div class="view-tab active" data-tab="staff">Staff Activity</div>
      <div class="view-tab" data-tab="patients">Patient Activity</div>
    </div>
    <div class="view-panel active" id="tab-staff">
      <div class="panel" style="padding:0;">
        <table>
          <thead><tr><th>When</th><th>Officer</th><th>Action</th><th>Resource</th><th>Detail</th></tr></thead>
          <tbody id="rowsStaff"><tr><td colspan="5">${loaderHtml("Loading…")}</td></tr></tbody>
        </table>
      </div>
    </div>
    <div class="view-panel" id="tab-patients">
      <div class="panel" style="padding:0;">
        <table>
          <thead><tr><th>When</th><th>Patient</th><th>Action</th><th>Detail</th></tr></thead>
          <tbody id="rowsPatients"><tr><td colspan="4">${loaderHtml("Loading…")}</td></tr></tbody>
        </table>
      </div>
    </div>
  `;

  document.querySelectorAll(".view-tab").forEach(t => {
    t.addEventListener("click", () => {
      document.querySelectorAll(".view-tab").forEach(x => x.classList.remove("active"));
      document.querySelectorAll(".view-panel").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      document.getElementById("tab-" + t.dataset.tab).classList.add("active");
    });
  });

  const ACTION_LABELS = {
    login: "Logged in",
    create_patient: "Opened folder",
    view_patient: "Viewed folder",
    update_patient: "Edited folder",
    create_medical_record: "Added doctor's report",
    update_medical_record: "Edited doctor's report",
    view_medical_records: "Viewed doctor's reports",
  };

  function staffRow(a) {
    return `
      <tr>
        <td>${fmtDateTime(a.created_at)}</td>
        <td>${escapeHtml(a.actor_email || "—")}</td>
        <td>${ACTION_LABELS[a.action] || escapeHtml(a.action)}</td>
        <td>${a.resource_type === "Patient" && a.resource_id ? `<a href="/patient.html?id=${a.resource_id}">Patient #${a.resource_id}</a>` : escapeHtml(a.resource_type)}</td>
        <td style="color:var(--ink-soft); font-size:.85rem;">${escapeHtml(a.detail || "")}</td>
      </tr>`;
  }

  function patientRow(a) {
    return `
      <tr>
        <td>${fmtDateTime(a.created_at)}</td>
        <td>${a.resource_id ? `<a href="/patient.html?id=${a.resource_id}">Patient #${a.resource_id}</a>` : escapeHtml(a.actor_email || "—")}</td>
        <td>${ACTION_LABELS[a.action] || escapeHtml(a.action)}</td>
        <td style="color:var(--ink-soft); font-size:.85rem;">${escapeHtml(a.detail || "")}</td>
      </tr>`;
  }

  try {
    const entries = await Api.auditLog();
    const staff = entries.filter(a => a.actor_role === "officer");
    const patients = entries.filter(a => a.actor_role === "patient");

    document.getElementById("rowsStaff").innerHTML = staff.length
      ? staff.map(staffRow).join("")
      : `<tr><td colspan="5"><div class="empty-state">No staff activity recorded yet.</div></td></tr>`;

    document.getElementById("rowsPatients").innerHTML = patients.length
      ? patients.map(patientRow).join("")
      : `<tr><td colspan="4"><div class="empty-state">No patient activity recorded yet.</div></td></tr>`;
  } catch (e) {
    document.getElementById("rowsStaff").innerHTML = `<tr><td colspan="5"><div class="empty-state">${escapeHtml(e.message)}</div></td></tr>`;
    document.getElementById("rowsPatients").innerHTML = `<tr><td colspan="4"><div class="empty-state">${escapeHtml(e.message)}</div></td></tr>`;
  }
})();
</script>
</body>
</html>
